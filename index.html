<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Political Science Interactive Quiz</title>
    <!-- Tailwind CSS for modern and responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        
        body {
            font-family: 'Pyidaungsu', sans-serif;
            padding-bottom: 70px; /* Space for the fixed footer at the very bottom */
            font-size: 18px;
        }
        .tab-active {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
            color: white !important;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
            border-color: transparent !important;
        }
        .blank-input {
            border-bottom: 2px solid #6366f1;
            text-align: center;
            color: #4f46e5;
            font-weight: bold;
            font-size: 19px;
            transition: all 0.2s ease-in-out;
            background-color: transparent;
        }
        .blank-input:focus {
            outline: none;
            border-bottom-color: #7c3aed;
            background-color: #f5f3ff;
            border-radius: 6px;
            padding: 0 6px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col antialiased text-slate-800">

    <!-- Top Header Area -->
    <header class="bg-gradient-to-r from-indigo-900 via-slate-900 to-purple-900 text-white shadow-md">
        <div class="container mx-auto max-w-4xl px-4 py-6 text-center">
            <h1 class="text-3xl md:text-4xl font-bold tracking-wide flex justify-center items-center gap-2">
                <span>🏛️</span> နိုင်ငံရေးသိပ္ပံ လေ့ကျင့်ခန်းကမ္ဘာ
            </h1>
            <p class="text-base md:text-lg text-indigo-200/80 mt-2 font-light">ကွက်လပ်ဖြည့် အပြန်အလှန်ဖြေဆိုခြင်းစနစ်</p>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto max-w-3xl px-4 py-8 flex-grow">
        
        <!-- Score Display Area (Modern Gradient Card) -->
        <div id="score-board" class="hidden mb-6 p-6 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-2xl text-center shadow-lg transform transition-all duration-300">
            <div class="text-sm uppercase tracking-widest font-semibold text-emerald-100">သင်၏ရလဒ်မှတ်စု</div>
            <div class="text-4xl font-extrabold mt-1" id="score-text">0 / 0</div>
        </div>

        <!-- Quiz Container Where Content Changes -->
        <div class="bg-white border border-slate-100 shadow-xl shadow-slate-200/50 rounded-2xl p-6 md:p-10 mb-8">
            <div id="section-title-wrapper" class="border-b border-slate-100 pb-5 mb-6">
                <h2 id="section-title" class="text-xl md:text-2xl font-bold text-slate-900 leading-normal"></h2>
            </div>
            
            <div id="quiz-container" class="space-y-6 text-lg md:text-xl">
                <!-- Dynamic Questions will load here -->
            </div>
        </div>

        <!-- Action Buttons (Check Answer & Try Again) -->
        <div id="action-buttons" class="flex items-center justify-center gap-4 mb-10">
            <button onclick="checkAnswers()" class="w-full md:w-auto min-w-[180px] bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold py-3.5 px-8 rounded-xl shadow-md hover:shadow-indigo-200 transition-all transform active:scale-95 text-center text-base md:text-lg">
                Check Answers
            </button>
            <button onclick="resetAndShuffle()" class="w-full md:w-auto min-w-[180px] bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-8 rounded-xl shadow-md transition-all transform active:scale-95 text-center text-base md:text-lg">
                Try Again
            </button>
        </div>

        <!-- Dynamic/Not-Fixed Tabs Area (Sits beautifully under the content) -->
        <div class="bg-slate-200/60 p-3 rounded-2xl border border-slate-300/40 mb-6">
            <div class="grid grid-cols-6 gap-1.5 text-center">
                <button id="tab-0" onclick="switchTab(0)" class="bg-white hover:bg-slate-100 text-slate-850 font-bold py-3 px-1 rounded-xl border border-slate-300/60 shadow-sm transition duration-200 flex flex-col items-center justify-center">
                    <span class="text-xs md:text-sm block">အပိုင်း</span>
                    <span class="text-base">၁</span>
                </button>
                <button id="tab-1" onclick="switchTab(1)" class="bg-white hover:bg-slate-100 text-slate-850 font-bold py-3 px-1 rounded-xl border border-slate-300/60 shadow-sm transition duration-200 flex flex-col items-center justify-center">
                    <span class="text-xs md:text-sm block">အပိုင်း</span>
                    <span class="text-base">၂</span>
                </button>
                <button id="tab-2" onclick="switchTab(2)" class="bg-white hover:bg-slate-100 text-slate-850 font-bold py-3 px-1 rounded-xl border border-slate-300/60 shadow-sm transition duration-200 flex flex-col items-center justify-center">
                    <span class="text-xs md:text-sm block">အပိုင်း</span>
                    <span class="text-base">၃</span>
                </button>
                <button id="tab-3" onclick="switchTab(3)" class="bg-white hover:bg-slate-100 text-slate-850 font-bold py-3 px-1 rounded-xl border border-slate-300/60 shadow-sm transition duration-200 flex flex-col items-center justify-center">
                    <span class="text-xs md:text-sm block">အပိုင်း</span>
                    <span class="text-base">၄</span>
                </button>
                <button id="tab-4" onclick="switchTab(4)" class="bg-white hover:bg-slate-100 text-slate-850 font-bold py-3 px-1 rounded-xl border border-slate-300/60 shadow-sm transition duration-200 flex flex-col items-center justify-center">
                    <span class="text-xs md:text-sm block">အပိုင်း</span>
                    <span class="text-base">၅</span>
                </button>
                <button id="tab-5" onclick="switchTab(5)" class="bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-3 px-1 rounded-xl border border-rose-200 shadow-sm transition duration-200 flex flex-col items-center justify-center">
                    <span class="text-xl mb-0.5">📄</span>
                    <span class="text-[11px] md:text-xs tracking-tighter">PDF ရယူရန်</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Strictly Fixed Position Footer Area (Always visible at the bottom) -->
    <footer class="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-md text-slate-300 border-t border-slate-800 py-3 text-center shadow-[0_-4px_20px_rgba(0,0,0,0.15)] pb-safe">
        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-1 text-sm md:text-base">
            <p class="font-medium">© 2026 Political Science Interactive Quiz World.</p>
            <p class="bg-indigo-600/30 text-indigo-300 font-bold px-3 py-0.5 rounded-full border border-indigo-500/30 text-xs md:text-sm">
                Student Number: 142
            </p>
        </div>
    </footer>

    <!-- JavaScript Data and Logic -->
    <script>
        const quizData = [
            {
                title: "၁။ အောက်ပါကွက်လပ်များကိုဖြည့်ပါ။<br><span class='text-sm font-normal text-indigo-600 block mt-1.5'>ဘာသာရပ် - နိုင်ငံရေးသိပ္ပံအခြေခံသဘောတရားနှင့်ကမ္ဘာ့နိုင်ငံရေးအတွေးအခေါ်များ</span>",
                questions: [
                    { id: "1_1", text: "<input type='text' class='blank-input w-40 mx-1' data-ans='လူ့အဖွဲ့အစည်း'> ၏ လူမှုကိစ္စအဝဝကို ဆောင်ရွက်ရာမှပင် လူသားတို့၏ <b>နိုင်ငံရေးဘဝ အစပြုခဲ့သည်</b>" },
                    { id: "1_2", text: "လူမှုဆိုင်ရာအခွင့်အာဏာ အုပ်ချုပ်ရေးဆိုင်ရာအခွင့်အာဏာ သို့မဟုတ် <input type='text' class='blank-input w-44 mx-1' data-ans='လူမှုပဋိညာဉ်'> ဟူသောရလဒ်ထွက်ပေါ်လာခြင်း အယူအဆသည် သီအိုရီမှ ဖြစ်ပေါ်လာခြင်း ဖြစ်သည်" },
                    { id: "1_3", text: "ပဋိပက္ခဖြေရှင်းခြင်းထက် လူ့အဖွဲ့အစည်းကို တရားမျှတမှု ရှိစေရန်ဆောင်ရွက် ပေးခြင်းမှာ နိုင်ငံရေး၏ <input type='text' class='blank-input w-40 mx-1' data-ans='အနှစ်သာရ'> ဟုမြင်ကြသည်။" },
                    { id: "1_4", text: "လိုရင်းတိုရှင်း အဓိပ္ပါယ်ဖွင့်ဆိုရသော် နိုင်ငံရေးသိပ္ပံပညာ ဆိုသည်မှာ <input type='text' class='blank-input w-44 mx-1' data-ans='နိုင်ငံနှင့်အစိုးရ'> ကို လေ့လာသောပညာဖြစ်သည်။" },
                    { id: "1_5", text: "<input type='text' class='blank-input w-40 mx-1' data-ans='အခွင့်အရေးများ'> သည် စည်းမျဉ်းစည်းကမ်းများနှင့် အလားတူ သဘောရှိ သည်" },
                    { id: "1_6", text: "<input type='text' class='blank-input w-40 mx-1' data-ans='အာဏာကို'> လိုသည်ထက်ပို၍ အသုံးပြုလျှင် အလွဲသုံးစား လုပ်ရာရောက်ပါသည်" },
                    { id: "1_7", text: "<input type='text' class='blank-input w-40 mx-1' data-ans='ဒီမိုကရေစီ'> ကို ပြည်သူအများစု၏ ဆန္ဒဖြင့်ရွေးချယ်တင်မြှောက်သည့် အစိုးရ အုပ်ချုပ်သည့်နိုင်ငံရေးစနစ်ဟုယေဘူယျအဓိပ္ပါယ်ဖွင့်ဆိုနိုင်သည်" },
                    { id: "1_8", text: "<input type='text' class='blank-input w-44 mx-1' data-ans='ဒီမိုကရေစီစနစ်'> သည် အဖွဲ့အစည်းတစ်ခုလုံးနှင့်ဆိုင်သော ဆုံးဖြတ်ချက်များ ချမှတ်ရာတွင် ယင်းအဖွဲ့အစည်းအားလုံး၏ သဘောဆန္ဒတန်းတူပေးပိုင်ခွင့် ကို ကိုယ်စားပြုသည်။" },
                    { id: "1_9", text: "<input type='text' class='blank-input w-36 mx-1' data-ans='သမိုင်း'> ဟူသည်မှာ လူတို့၏ဖြစ်စဉ်ဖြစ်ရပ်များကို စနစ်တကျမှတ်တမ်း တင်ထားခြင်းပင်ဖြစ်သည်။" },
                    { id: "1_10", text: "<input type='text' class='blank-input w-36 mx-1' data-ans='အာဏာ'> သည် တစ်စုံတစ်ယောက်က မိမိလုပ်လိုသောအလုပ်ကို သူတစ်ပါး အားဆောင်ရွက်ပေးစေရန်လုပ်ဆောင်နိုင်စွမ်းသည့် စွမ်းရည်အဖြစ် အလွယ်ဖွင့်ဆိုနိုင်သည်။" },
                    { id: "1_11", text: "<input type='text' class='blank-input w-40 mx-1' data-ans='Jacoban'> မှ <b>နိုင်ငံရေးမှကင်းသော သမိုင်းသည် အနှစ်သာရ မရှိ، သမိုင်းနှင့်ကင်းသောနိုင်ငံရေးသည် အခြေအမြစ်မရှိ</b> ဟုဆိုခဲ့သည်" },
                    { id: "1_12", text: "ကမ္ဘာပေါ်တွင် ဒီမိုကရေစီကျင့်သုံးသည့်နိုင်ငံပေါင်း <input type='text' class='blank-input w-28 mx-1' data-ans='၁၂၀'> ကျော်ရှိနေပြီ ဖြစ်သည်။" }
                ]
            },
            {
                title: "၂။ အောက်ပါကွက်လပ်များကိုဖြည့်ပါ။<br><span class='text-sm font-normal text-indigo-600 block mt-1.5'>ဘာသာရပ် - ပထဝီဝင်နိုင်ငံရေး</span>",
                questions: [
                    { id: "2_1", text: "ပထဝီဝင်ဆိုင်ရာ အချက်အလက်များအပေါ်အခြေခံ၍ နိုင်ငံတစ် နိုင်ငံ၏ လုံခြုံရေးမူဝါဒကို စီစဉ်ရေးဆွဲခြင်းသည် <input type='text' class='blank-input w-44 mx-1' data-ans='ပထဝီဝင်နိုင်ငံရေး'> ဖြစ်သည်။" },
                    { id: "2_2", text: "မိမိနိုင်ငံ၏ပိုင်နက်နယ်မြေနှင့် နိုင်ငံသားတို့ မပျောက်ပျက်၊ မဆုံး ရှုံစေရန် အဓိကလိုအပ်ချက်(၂)ချက်မှာ <input type='text' class='blank-input w-40 mx-1' data-ans='ကာကွယ်ရေး'> နှင့် စီးပွားရေးတို့ဖြစ်ပါသည်။" },
                    { id: "2_3", text: "<b><input type='text' class='blank-input w-40 mx-1' data-ans='ရေတပ်အင်အား'> ကြီးမားခြင်း သည် ကမ္ဘာကြီးကိုလွှမ်းမိုးနိုင်သည်</b> ဟူသော အယူ အဆကို အဲလ်ဖရက်သေယာမဟန်မှ တင်ပြခဲ့ပါ သည်" },

                    { id: "2_5", text: "မက်ကင်ဒါ၏ နှလုံးသားနယ်မြေအယူအဆအရ <input type='text' class='blank-input w-40 mx-1' data-ans='အမေရိကန်'> ပြောင်စု သည် ဒုတိယကမ္ဘာစစ် ပြီးကာလမှစ၍ ယနေ့ အချိန်ထိ <b>Western's Containment Policy</b> ကိုချမှတ်၍ ရုရှားအားပိတ်ဆို့ရန် ကြိုးစားခဲ့သည်" },

                    { id: "5_8", text: "နိုင်ငံ့ဝန်ထမ်းများအနေဖြင့် ပြည်သူ့ရေးရာမူဝါဒကိုလက်တွေ့ <input type='text' class='blank-input w-44 mx-1' data-ans='စီမံခန့်ခွဲမှုလုပ်ငန်း'> များ နှင့် ချိတ်ဆက်လုပ်ဆောင်ရမည်။" },
                    { id: "5_9", text: "မူဝါဒချမှတ်ရာတွင် ဆုံးဖြတ်မှုပါဝင်ရပြီး ဆုံးဖြတ်ချက်ချမှတ်တိုင်း မူဝါဒကို <input type='text' class='blank-input w-36 mx-1' data-ans='စုဖွဲ့ရန်'> မလိုအပ်ပါ" },
                    { id: "5_10", text: "မူဝါဒများတွင် <b><input type='text' class='blank-input w-44 mx-1' data-ans='ရည်မှန်းချက်ပန်းတိုင်'> များ</b> ပြတ်သားမှုရှိလျှင် အဆုံးတွင် မည်သည့်အရာ များ ရရှိလာမည်ကိုပိုင်းခြား သိမြင်နိုင်သည်" },
                    { id: "5_11", text: "ပြည်သူ့ရေးရာမူဝါဒသည် မတူညီသောနိုင်ငံများ၏ မတူညီ သော <input type='text' class='blank-input w-36 mx-1' data-ans='နိုင်ငံရေးစနစ်'> များကို အမှီပြု၍ ပေါ်ပေါက်လာခြင်း ဖြစ်သည်။" },
                    { id: "5_12", text: "<b><input type='text' class='blank-input w-44 mx-1' data-ans='မူဝါဒစီမံခန့်ခွဲခြင်း'></b> တွင် အရည်အသွေးမြင့်မူဝါဒချမှတ်ခြင်း၊ မူဝါဒပြင်ဆင်ခြင်း လုပ်ငန်းစဉ်များနှင့် ပတ်သက်နေပါသည်။" },
                    { id: "5_13", text: "မူဝါဒချမှတ်ခြင်းလုပ်ငန်းစဉ်ကို ပံ့ပိုးဆောင်ရွက်ရန်အတွက် အဆင့်မြင့်အရာရှိကြီးများသည်မူဝါဒရေးရာပြဿနာရပ်များကိုနားလည်နိုင်သော <input type='text' class='blank-input w-36 mx-1' data-ans='စွမ်းဆောင်ရည်'> နှင့် အတွေ့အကြုံများ ရှိရန်လိုသည်" },
                    { id: "5_14", text: "ပညာရေး، လူမှုဖူလုံရေး၊ ကျန်းမာရေးဝန်ဆောင်မှုနှင့် အခြားလူထု အထောက်အကူပြု အစီအစဉ်များသို့ ငွေလုံးငွေရင်းထောက်ပံ့ခြင်း သည် <input type='text' class='blank-input w-44 mx-1' data-ans='ခွဲဝေဖြန့်ဖြူးခြင်းဆိုင်ရာမူဝါဒ'> ကိစ္စရပ်များဖြစ်သည်" }
                ]
            }
        ];

        let currentTab = 0;
        let activeQuestions = [];

        function initQuiz() {
            switchTab(0);
        }

        function switchTab(tabIndex) {
            if (tabIndex === 5) {
                triggerDownload();
                return;
            }

            currentTab = tabIndex;
            document.getElementById("score-board").classList.add("hidden");

            for (let i = 0; i < 5; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (i === tabIndex) {
                    tab.classList.add("tab-active");
                } else {
                    tab.classList.remove("tab-active");
                }
            }

            document.getElementById("section-title").innerHTML = quizData[tabIndex].title;
            activeQuestions = JSON.parse(JSON.stringify(quizData[tabIndex].questions));
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toMyanmarDigits(num) {
            const mDigits = ['၀', '၁', '၂', '၃', '၄', '၅', '၆', '၇', '၈', '၉'];
            return num.toString().split('').map(d => mDigits[d] || d).join('');
        }

        function renderQuestions() {
            const container = document.getElementById("quiz-container");
            container.innerHTML = "";

            activeQuestions.forEach((q, index) => {
                const div = document.createElement("div");
                div.className = "p-5 md:p-6 bg-slate-50 hover:bg-indigo-50/30 rounded-xl border border-slate-200/80 transition-all duration-200 text-slate-900 leading-relaxed shadow-sm flex flex-col gap-3";
                
                const serialNumber = toMyanmarDigits(index + 1) + "။ ";

                div.innerHTML = `
                    <div class="text-[17px] md:text-[19px]"><strong class="text-indigo-900 font-bold mr-1">${serialNumber}</strong>${q.text}</div>
                    <div id="ans-block-${index}" class="hidden p-3.5 rounded-xl text-base font-semibold"></div>
                `;
                container.appendChild(div);
            });
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll(".blank-input");
            let correctCount = 0;
            let totalCount = inputs.length;

            inputs.forEach((input, index) => {
                const userAns = input.value.trim().toLowerCase();
                const correctAns = input.getAttribute("data-ans").trim().toLowerCase();
                const actualAnsText = input.getAttribute("data-ans");
                const ansBlock = document.getElementById(`ans-block-${index}`);

                if (userAns === correctAns) {
                    correctCount++;
                    input.className = "blank-input w-40 mx-1 text-emerald-600 border-b-2 border-emerald-500 font-bold bg-emerald-50/50 rounded px-1.5";
                    if (ansBlock) {
                        ansBlock.innerText = `✓ မှန်ပါသည် (အဖြေ - ${actualAnsText})`;
                        ansBlock.className = "p-3.5 rounded-xl text-base font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100 block";
                    }
                } else {
                    input.className = "blank-input w-40 mx-1 text-rose-600 border-b-2 border-rose-500 font-bold bg-rose-50/50 rounded px-1.5";
                    if (ansBlock) {
                        ansBlock.innerText = `✗ မှားပါသည် (အဖြေမှန် - ${actualAnsText})`;
                        ansBlock.className = "p-3.5 rounded-xl text-base font-semibold bg-rose-50 text-rose-700 border border-rose-100 block";
                    }
                }
            });

            const scoreBoard = document.getElementById("score-board");
            const scoreText = document.getElementById("score-text");
            scoreText.innerText = `${toMyanmarDigits(correctCount)} / ${toMyanmarDigits(totalCount)}`;
            scoreBoard.classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function resetAndShuffle() {
            document.getElementById("score-board").classList.add("hidden");
            shuffle(activeQuestions);
            renderQuestions();
        }

        // Folder ထဲရှိပြီးသား တကယ့် PDF ဖိုင်ကို လှမ်းခေါ်ပြီး ဒေါင်းလုတ်လုပ်ပေးမည့် လုပ်ဆောင်ချက်
        function triggerDownload() {
            const link = document.createElement("a");
            
            // မှတ်ချက်- ဖိုင်သည် လက်ရှိ index.html နှင့် folder တစ်ခုတည်း (same directory) မှာရှိနေရပါမည်။
            // အကယ်၍ အခြား folder တစ်ခုခုထဲ (ဥပမ- pdfs/Politicalscience.pdf) မှာဆိုလျှင် path လမ်းကြောင်း ပြင်ပေးရန် လိုအပ်ပါသည်။
            link.href = "Politicalscience.pdf"; 
            link.download = "Politicalscience.pdf";
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = initQuiz;
    </script>
